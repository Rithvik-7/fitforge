<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coach | FitForge</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 8%;
      background: rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(10px);
    }

    .logo {
      color: #22c55e;
      font-weight: bold;
      font-size: 22px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
    }

    .nav-links a:hover {
      color: #22c55e;
    }

    .ai-btn {
      border: 1px solid #22c55e;
      padding: 5px 10px;
      border-radius: 8px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 10%;
    }

    .hero h2 {
      font-size: 40px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      color: #cbd5f5;
      margin-top: 10px;
    }

    /* CONTAINER */
    .ai-container {
      max-width: 800px;
      margin: auto;
      padding: 30px;
      background: rgba(30, 41, 59, 0.6);
      border-radius: 15px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      color: #cbd5f5;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #22c55e;
      color: black;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      box-shadow: 0 0 20px #22c55e;
    }

    /* OUTPUT */
    .output {
      margin-top: 30px;
      padding: 20px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.9);
      display: none;
    }

    .output h3 {
      margin-bottom: 10px;
      color: #22c55e;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: #020617;
    }

  </style>
</head>

<body>

<header>
  <nav class="navbar">
    <h1 class="logo">FitForge</h1>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="workouts.html">Workouts</a></li>
      <li><a href="nutrition.html">Nutrition</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="ai.html" class="ai-btn">AI Coach</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <h2>Your Personal AI Fitness Coach</h2>
  <p>Tell us your goal. Get your plan instantly.</p>
</section>

<section class="ai-container">

  <div class="input-group">
    <label>Goal</label>
    <select id="goal">
      <option>Gain Weight</option>
      <option>Lose Fat</option>
      <option>Build Muscle</option>
    </select>
  </div>

  <div class="input-group">
    <label>Current Weight (kg)</label>
    <input type="number" id="weight">
  </div>

  <div class="input-group">
    <label>Workout Days / Week</label>
    <input type="number" id="days">
  </div>

  <div class="input-group">
    <label>Gender</label>
    <select id="gender">
      <option>Male</option>
      <option>Female</option>
    </select>
  </div>

  <button onclick="generatePlan()">Generate Plan</button>

  <div class="output" id="outputBox">
    <h3>Your Plan</h3>
    <p id="result"></p>
  </div>

</section>

<footer>
  <p>© 2026 FitForge</p>
</footer>

<script>
  function generatePlan() {
    let goal = document.getElementById("goal").value;
    let days = document.getElementById("days").value;

    let plan = "";

    if(goal === "Gain Weight") {
      plan = "Eat in calorie surplus. Focus on rice, paneer, milk, nuts. Train 4-5 days with compound lifts.";
    }
    else if(goal === "Lose Fat") {
      plan = "Maintain calorie deficit. Increase protein intake. Do cardio + weight training " + days + " days/week.";
    }
    else {
      plan = "Train heavy with progressive overload. Focus on protein intake and proper recovery.";
    }

    document.getElementById("outputBox").style.display = "block";
    document.getElementById("result").innerText = plan;
  }
</script>

</body>
</html>
